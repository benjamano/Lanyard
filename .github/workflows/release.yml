name: Release
on:
  push:
    branches:
      - main
    paths:
      - 'src/Lanyard.Client/**'
      - 'src/Lanyard.Shared/**'
      - 'src/Lanyard.Infrastructure/**'
      - 'src/Lanyard.Tests/Client/**'
      - 'src/Lanyard.Client.Watchdog/**'
jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write 
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Get version
        id: version
        run: |
          $xml = [xml](Get-Content src/Lanyard.Client/Lanyard.Client.csproj)
          $version = ($xml.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1).Version.Trim()
          Write-Host "Resolved version: '$version'"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Generate release notes
        run: |
          $previousTag = git describe --tags --match "LanyardClient-*" --abbrev=0 2>$null
          $global:LASTEXITCODE = 0

          if ([string]::IsNullOrWhiteSpace($previousTag)) {
            Write-Host "No previous LanyardClient tag found, using full history"
            $range = "HEAD"
          }
          else {
            Write-Host "Previous tag: $previousTag"
            $range = "$previousTag..HEAD"
          }

          $commits = git log $range --no-merges --pretty=format:"- %s (%h)"
          if ([string]::IsNullOrWhiteSpace($commits)) {
            $commits = "- No changes recorded since the previous release."
          }

          $notes = "## What's Changed", ""
          $notes += $commits
          if (-not [string]::IsNullOrWhiteSpace($previousTag)) {
            $notes += ""
            $notes += "**Full changelog**: https://github.com/${{ github.repository }}/compare/$previousTag...LanyardClient-${{ steps.version.outputs.VERSION }}"
          }

          Set-Content -Path release-notes.md -Value $notes -Encoding utf8
          Get-Content release-notes.md

      - name: Publish app
        run: dotnet publish src/Lanyard.Client/Lanyard.Client.csproj -c Release -r win-x64 --self-contained -o ./publish

      - name: Package with Velopack
        run: vpk pack --packId LanyardClient --packVersion ${{ steps.version.outputs.VERSION }} --packDir ./publish --mainExe Lanyard.Client.exe --icon src/Lanyard.Client/favicon.ico --releaseNotes release-notes.md

      - name: Create and push tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "LanyardClient-${{ steps.version.outputs.VERSION }}"
          git push origin "LanyardClient-${{ steps.version.outputs.VERSION }}"

      - name: Upload to GitHub Releases
        run: vpk upload github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }} --tag "LanyardClient-${{ steps.version.outputs.VERSION }}" --releaseName "Lanyard Client ${{ steps.version.outputs.VERSION }}" --publish