name: Release
on:
  push:
    branches:
      - main
    paths:
      - 'src/LanyardClient/**'
      - 'src/Lanyard.Shared/**'
      - 'src/LanyardData/**'
      - 'src/LanyardTests/Client/**'
      - 'src/LanyardClient.Watchdog/**'
jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write 
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Get version
        id: version
        run: |
          $version = ([xml](Get-Content src/LanyardClient/Lanyard.Client.csproj)).Project.PropertyGroup.Version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Publish app
        run: dotnet publish src/LanyardClient/Lanyard.Client.csproj -c Release -r win-x64 --self-contained -o ./publish

      - name: Package with Velopack
        run: vpk pack --packId LanyardClient --packVersion ${{ steps.version.outputs.VERSION }} --packDir ./publish --mainExe Lanyard.Client.exe

      - name: Upload to GitHub Releases
        run: vpk upload github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }} --tag "LanyardClient-${{ steps.version.outputs.VERSION }}" --releaseName "Lanyard Client ${{ steps.version.outputs.VERSION }}" --publish